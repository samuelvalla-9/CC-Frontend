<div class="login-container">
  <div class="login-card">
    <div class="brand">
      <span class="brand-icon">🏥</span>
      <h1>CityCare</h1>
      <p class="tagline">Urban Healthcare & Emergency Response</p>
    </div>
    
    <div class="tabs">
      <button [class.active]="!isRegister" (click)="isRegister = false">Login</button>
      <button [class.active]="isRegister" (click)="isRegister = true">Register</button>
    </div>

    <form (ngSubmit)="onSubmit()">
      @if (isRegister) {
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="name" name="name" placeholder="Enter your name" required />
        </div>
      }
      
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="Enter email" required />
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" required />
      </div>

      @if (isRegister) {
        <div class="form-group">
          <label>Role</label>
          <select [(ngModel)]="role" name="role">
            @for (r of roles; track r) {
              <option [value]="r">{{ r }}</option>
            }
          </select>
        </div>
      }

      @if (error) {
        <div class="error">{{ error }}</div>
      }

      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? 'Processing...' : (isRegister ? 'Register' : 'Login') }}
      </button>
    </form>
  </div>
</div>
